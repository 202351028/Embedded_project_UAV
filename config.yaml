mavsdk:
  action_timeout_sec: 12.0
  connect_call_timeout_sec: 8.0

logging:
  log_every_n_cycles: 10

swarm:
  control_rate_hz: 10.0
  neighbor_range_m: 15.0
  arrival_radius_m: 1.0
  max_speed_mps: 3.0

  # Weights from the paper model:
  # v_i = v_sep + v_coh + v_ali + v_mig (+ leader/follower coupling)
  k_sep: 1.3
  k_coh: 0.25
  k_ali: 0.35
  k_mig: 0.75
  k_follow: 0.8
  k_neighbor_response: 0.7
  k_obstacle: 2.2
  k_threat_repulsion: 1.8
  k_threat_tangential: 1.15
  k_stationary_damping: 0.55

  # Lower value means stronger repulsion when close.
  min_sep_distance_m: 0.5

behavior:
  identity_check_enabled: true
  followers_require_leader_visibility: true

formation:
  sphere_radius_m: 3.2
  use_config_offsets: false

environment:
  zone_height_scale: 2.0
  zones:
    - name: building_cluster_a
      kind: obstacle
      center_ned_m: [8.0, 16.0, -6.0]
      radius_m: 3.2
      influence_m: 8.5
      height_m: 4.0
      repulsion_gain: 1.25
      speed_scale: 0.75

    - name: tower_obstacle_b
      kind: obstacle
      center_ned_m: [22.0, 4.0, -6.0]
      radius_m: 2.4
      influence_m: 7.0
      height_m: 4.5
      repulsion_gain: 1.3
      speed_scale: 0.7

    - name: obstacle_south
      kind: obstacle
      center_ned_m: [16.0, -8.0, -6.0]
      radius_m: 2.6
      influence_m: 7.2
      height_m: 4.2
      repulsion_gain: 1.2
      speed_scale: 0.72

    - name: threat_corridor_1
      kind: threat
      center_ned_m: [30.0, 12.0, -6.0]
      radius_m: 4.2
      influence_m: 10.5
      height_m: 1.0
      repulsion_gain: 1.0
      tangential_gain: 1.1
      speed_scale: 0.6

    - name: threat_corridor_2
      kind: threat
      center_ned_m: [4.0, -10.0, -6.0]
      radius_m: 3.6
      influence_m: 8.8
      height_m: 1.2
      repulsion_gain: 1.0
      tangential_gain: 1.25
      speed_scale: 0.58

drones:
  - name: drone_1
    role: leader
    mavlink_udp: "udp://:14561"
    mavsdk_server_port: 50051
    source_ned_m: [0.0, 0.0, -6.0]
    destination_ned_m: [30.0, 20.0, -8.0]

  - name: drone_2
    role: follower
    mavlink_udp: "udp://:14562"
    mavsdk_server_port: 50052
    source_ned_m: [-2.5, -2.0, -6.0]
    desired_offset_from_leader_m: [-3.0, -3.0, 0.0]

  - name: drone_3
    role: follower
    mavlink_udp: "udp://:14563"
    mavsdk_server_port: 50053
    source_ned_m: [2.5, -2.0, -6.0]
    desired_offset_from_leader_m: [3.0, -3.0, 0.0]
